name = "rss-feed-bot"
main = "index.js"
compatibility_date = "2026-07-17"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

# Persist every allowlisted application log while diagnosing Telegram egress.
# Source maps keep uncaught runtime stacks readable without logging them ourselves.
[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1.0
invocation_logs = true
persist = true

[observability.traces]
# Automatic fetch spans contain url.full/url.path. Telegram embeds the bot token
# in that path, so traces must stay off until those attributes can be redacted or
# the Bot API call is moved behind a token-hiding proxy.
enabled = false

[triggers]
crons = ["*/15 * * * *"]

[[kv_namespaces]]
binding = "DB"
id = "b2585c40b20a4a0a915fd3cd0f8e7f60"
preview_id = "6fcf4c1895ab4655ba65f10a7b99d1bb"

[[d1_databases]]
binding = "SQL"
database_name = "rss-feed-bot-db"
database_id = "39259933-3a54-4a0b-ba25-dd5edea97bcd"
migrations_dir = "migrations"
