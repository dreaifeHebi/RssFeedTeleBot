name: Deploy to Cloudflare Workers

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
  pull_request:
    types:
      - closed
    branches:
      - master

jobs:
  verify:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check
      - name: Verify Worker bundle
        run: |
          sed -i \
            -e 's/TODO_REPLACE_WITH_YOUR_KV_ID/00000000000000000000000000000000/g' \
            -e 's/TODO_REPLACE_WITH_YOUR_KV_PREVIEW_ID/00000000000000000000000000000000/g' \
            -e 's/TODO_REPLACE_WITH_YOUR_D1_ID/00000000-0000-0000-0000-000000000000/g' \
            wrangler.toml
          npx wrangler deploy --dry-run --outdir .wrangler/dry-run

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
    needs: verify
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Verify deployment configuration
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$TELEGRAM_WEBHOOK_SECRET"
          test -n "$KV_ID"
          test -n "$D1_ID"
          sed -i \
            -e "s/TODO_REPLACE_WITH_YOUR_KV_ID/$KV_ID/g" \
            -e "s/TODO_REPLACE_WITH_YOUR_KV_PREVIEW_ID/$KV_ID/g" \
            -e "s/TODO_REPLACE_WITH_YOUR_D1_ID/$D1_ID/g" \
            wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          KV_ID: ${{ secrets.KV_ID }}
          D1_ID: ${{ secrets.D1_ID }}
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply SQL --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          wranglerVersion: '4.111.0'
          secrets: |
            TELEGRAM_BOT_TOKEN
            TELEGRAM_WEBHOOK_SECRET
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
